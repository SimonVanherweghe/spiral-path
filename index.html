<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Spiral Path</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html, body {
			height: 100%;
		}

		body {
			display: flex;
			font-family: sans-serif;
			background: #f5f5f5;
		}

		aside {
			width: max-content;
			flex-shrink: 0;
			padding: 2rem;
			overflow-y: auto;
			border-right: 1px solid #ddd;
			background: #fafafa;
		}

		#canvas-container {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		aside h2 {
			font-size: 1rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #666;
			margin-bottom: 1rem;
		}

		dl {
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
		}

		div.entry {
			display: flex;
			flex-direction: column;
			gap: 0.2rem;
		}

		dt {
			font-family: monospace;
			font-size: 0.8rem;
			background: #e8e8e8;
			padding: 0.15rem 0.4rem;
			border-radius: 3px;
			white-space: nowrap;
			width: max-content;
		}

		dd {
			font-size: 0.875rem;
			color: #444;
		}

		select {
			font-size: 0.875rem;
			padding: 0.25rem 0.4rem;
			border: 1px solid #ddd;
			border-radius: 3px;
			background: #fff;
			color: #444;
			cursor: pointer;
			width: 100%;
		}
	</style>
</head>

<body>
	<aside>
		<h2>Canvas</h2>
		<label for="aspect-ratio" style="font-size:0.875rem;color:#444;display:block;margin-bottom:0.4rem;">Aspect ratio</label>
		<select id="aspect-ratio" style="margin-bottom:1.5rem;">
			<option value="1:1" selected>1:1</option>
			<option value="4:3">4:3</option>
			<option value="3:2">3:2</option>
			<option value="16:9">16:9</option>
			<option value="A4P">A4 Portrait</option>
			<option value="A4L">A4 Landscape</option>
		</select>
		<label for="physical-size" style="font-size:0.875rem;color:#444;display:block;margin-bottom:0.4rem;">Physical size (largest side)</label>
		<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
			<input type="number" id="physical-size" value="210" min="1" step="1" style="width:5rem;">
			<select id="physical-unit">
				<option value="mm" selected>mm</option>
				<option value="cm">cm</option>
			</select>
		</div>
		<p style="font-size:0.875rem;color:#444;margin-bottom:1.5rem;">Spacing: <strong><span id="physical-spacer">—</span></strong></p>
		<h2>Controls</h2>
		<dl>
			<div class="entry"><dt>Click</dt><dd>Add bend</dd></div>
			<div class="entry"><dt>ESC</dt><dd>Toggle add mode</dd></div>
			<div class="entry"><dt>UP/DOWN ARROW</dt><dd>Amount of rounds</dd></div>
			<div class="entry"><dt>LEFT/RIGHT ARROW</dt><dd>Adjust spacer</dd></div>
			<div class="entry"><dt>D</dt><dd>Toggle debug mode</dd></div>
			<div class="entry"><dt>G</dt><dd>Toggle snap guidelines</dd></div>
			<div class="entry"><dt>C</dt><dd>Clear all points</dd></div>
			<div class="entry"><dt>R</dt><dd>Remove last point</dd></div>
			<div class="entry"><dt>S</dt><dd>Save as SVG</dd></div>
		</dl>
	</aside>
	<div id="canvas-container"></div>
	<script type="module" src="src/sketch.js"></script>
</body>

</html>
